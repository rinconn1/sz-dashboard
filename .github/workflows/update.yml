name: 每日更新深圳楼市数据

on:
  schedule:
    # 每天北京时间8:00 = UTC 0:00
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 更新数据
        run: |
          # 将脚本中的绝对路径替换为当前工作目录
          sed -i "s|DIR = \"/Users/renzheng/WorkBuddy/20260320134026\"|DIR = \"$(pwd)\"|g" update.py
          python3 update.py

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sz_dashboard.html sz_realestate_data.json sz_monthly_history.json sz_avg_price.json
          git diff --staged --quiet || git commit -m "自动更新: $(date +'%Y-%m-%d') 深圳楼市数据"
          git push
